# specs/screens/settings.yaml — S3 설정
version: "2.0"
screen:
  name: 설정
  route: /settings
  layout: form
  purpose: "알림 기본 동작 설정 (MVP는 최소)"

data_requirements:
  - resource: app_settings        # 로컬 UserDefaults (도메인 아님)
    needs: [notifyByDefault, defaultLeadMinutes]

components:
  - id: notify_default_toggle
    type: toggle
    function: "마감 시각에 자동 알림 켜기 (기본 on/off)"
  - id: lead_time_picker
    type: picker
    function: "기본 알림 리드타임 (정시 / 10분 전 / 1시간 전)"
  - id: notify_permission_note
    type: info
    function: "알림 권한 미허용 시 안내 + 설정 앱 이동"
  - id: could_placeholder
    type: info
    function: "반복·태그·외부 연동은 이번 버전 없음(숨김/비활성)"

states:
  permission_denied: "알림 권한이 꺼져 있어요. 설정에서 켜야 제때 알림이 가요. (iOS 설정 열기)"

tests:
  - name: 알림 기본값 변경
    when: "리드타임을 '10분 전'으로 변경"
    then: ["이후 생성 항목의 기본 notifyAt = dueAt - 10분"]
  - name: 권한 안내
    when: "알림 권한 거부 상태"
    then: ["권한 안내 + 설정 이동 버튼 표시"]
