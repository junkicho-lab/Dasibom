name: Dasibom
options:
  bundleIdPrefix: com.junkicho
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Dasibom:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
    dependencies:
      - target: DasibomWidget
        embed: true
    entitlements:
      path: Sources/Dasibom.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.junkicho.dasibom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junkicho.dasibom
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 다시봄
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
  DasibomWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    entitlements:
      path: Widget/DasibomWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.junkicho.dasibom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junkicho.dasibom.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widget/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
  DasibomTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Dasibom
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
